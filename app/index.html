<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Traffic Router</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <div class="app">

    <!-- ── RIGHT: Form panel ── -->
    <div class="form-panel">
      <div class="form-inner">

        <div class="form-header">
          <div class="form-tag">ROUTE PLANNER</div>
          <h2 class="form-title">Find your<br/>optimal route</h2>
          <p class="form-desc">Enter your journey details. Our ML model predicts junction traffic and finds the least congested path.</p>
        </div>

        <form id="routeForm" autocomplete="off">

          <div class="field-group">
            <label class="field-label" for="startPoint">Starting point</label>
            <div class="select-wrap">
              <select id="startPoint" name="startPoint" required>
                <option value="" disabled selected>Select a point</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="E">E</option>
                <option value="F">F</option>
                <option value="G">G</option>
                <option value="H">H</option>
              </select>
              <span class="select-arrow">▾</span>
            </div>
          </div>

          <div class="swap-row">
            <div class="swap-line"></div>
            <button type="button" class="swap-btn" id="swapBtn" title="Swap points">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M4 3v10M4 3L2 5M4 3l2 2M12 13V3M12 13l-2-2M12 13l2-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div class="swap-line"></div>
          </div>

          <div class="field-group">
            <label class="field-label" for="endPoint">Destination</label>
            <div class="select-wrap">
              <select id="endPoint" name="endPoint" required>
                <option value="" disabled selected>Select a point</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="E">E</option>
                <option value="F">F</option>
                <option value="G">G</option>
                <option value="H">H</option>
              </select>
              <span class="select-arrow">▾</span>
            </div>
          </div>

          <div class="field-row">
            <div class="field-group half">
              <label class="field-label" for="travelDate">Date</label>
              <input type="date" id="travelDate" name="travelDate" required placeholder="dd/mm/yyyy"/>
            </div>

            <div class="field-group half">
              <label class="field-label" for="travelHour">Time</label>
              <div class="select-wrap">
                <select id="travelHour" name="travelHour" required>
                  <option value="" disabled selected>Hour</option>
                  <option value="0">12:00 AM</option>
                  <option value="1">1:00 AM</option>
                  <option value="2">2:00 AM</option>
                  <option value="3">3:00 AM</option>
                  <option value="4">4:00 AM</option>
                  <option value="5">5:00 AM</option>
                  <option value="6">6:00 AM</option>
                  <option value="7">7:00 AM</option>
                  <option value="8">8:00 AM</option>
                  <option value="9">9:00 AM</option>
                  <option value="10">10:00 AM</option>
                  <option value="11">11:00 AM</option>
                  <option value="12">12:00 PM</option>
                  <option value="13">1:00 PM</option>
                  <option value="14">2:00 PM</option>
                  <option value="15">3:00 PM</option>
                  <option value="16">4:00 PM</option>
                  <option value="17">5:00 PM</option>
                  <option value="18">6:00 PM</option>
                  <option value="19">7:00 PM</option>
                  <option value="20">8:00 PM</option>
                  <option value="21">9:00 PM</option>
                  <option value="22">10:00 PM</option>
                  <option value="23">11:00 PM</option>
                </select>
                <span class="select-arrow">▾</span>
              </div>
            </div>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">
            <span class="btn-text">Find Route</span>
            <span class="btn-icon">→</span>
          </button>

        </form>

        <!-- Result card -->
        <div class="result-card" id="resultCard">
          <div class="result-header">
            <span class="result-tag">OPTIMAL ROUTE</span>
            <button class="result-close" id="clearBtn">✕</button>
          </div>
          <div class="result-path" id="resultPath"></div>
          <div class="result-meta" id="resultMeta"></div>
          <div class="result-junctions" id="resultJunctions"></div>
        </div>

        <p class="form-note">* Traffic weights are predicted by the ML model based on historical junction data (Nov 2015 – Jun 2017).</p>

      </div>
    </div>

  </div>

  <script src="index.js"></script>
</body>
</html>
